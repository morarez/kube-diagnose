# This rule is not used by the project kube-diagnose itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to diagnose.diagnose.k8s.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kube-diagnose
    app.kubernetes.io/managed-by: kustomize
  name: incident-viewer-role
rules:
- apiGroups:
  - diagnose.diagnose.k8s.io
  resources:
  - incidents
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - diagnose.diagnose.k8s.io
  resources:
  - incidents/status
  verbs:
  - get

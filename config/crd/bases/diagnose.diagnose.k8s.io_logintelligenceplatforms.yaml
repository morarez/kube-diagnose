---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    api-approved.kubernetes.io: https://github.com/kubernetes/kubernetes/pull/1111
    controller-gen.kubebuilder.io/version: v0.17.2
  name: logintelligenceplatforms.diagnose.diagnose.k8s.io
spec:
  group: diagnose.diagnose.k8s.io
  names:
    kind: LogIntelligencePlatform
    listKind: LogIntelligencePlatformList
    plural: logintelligenceplatforms
    shortNames:
    - lip
    singular: logintelligenceplatform
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    - jsonPath: .spec.llm.provider
      name: LLM
      type: string
    - jsonPath: .status.activeIncidents
      name: Incidents
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          LogIntelligencePlatform is the Schema for the logintelligenceplatforms API.
          It defines global configuration for the AI-powered log intelligence platform.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: LogIntelligencePlatformSpec defines the desired state of
              LogIntelligencePlatform.
            properties:
              analysis:
                description: Analysis configures AI analysis behavior and cost controls.
                properties:
                  criticalRagConfidenceThreshold:
                    default: "0.90"
                    description: CriticalRAGConfidenceThreshold is the higher threshold
                      for critical incidents.
                    type: string
                  llmCacheTTL:
                    default: 24h
                    description: LLMCacheTTL is how long to cache LLM analysis results
                      (e.g. "24h").
                    type: string
                  maxLLMCallsPerHour:
                    default: 60
                    description: MaxLLMCallsPerHour limits LLM API calls for cost
                      control.
                    type: integer
                  ragConfidenceThreshold:
                    default: "0.75"
                    description: |-
                      RAGConfidenceThreshold is the minimum RAG similarity score to skip LLM analysis.
                      When RAG confidence is above this threshold, LLM is NOT invoked.
                    type: string
                type: object
              dashboardEnabled:
                default: true
                description: Dashboard enables the built-in web dashboard.
                type: boolean
              dashboardPort:
                default: 8080
                description: DashboardPort is the port for the dashboard HTTP server.
                type: integer
              embedding:
                description: Embedding is the vector embedding configuration.
                properties:
                  apiKeySecretRef:
                    description: APIKeySecretRef references a secret containing the
                      API key.
                    properties:
                      key:
                        description: Key is the key within the secret.
                        type: string
                      name:
                        description: Name is the name of the secret.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  endpoint:
                    description: Endpoint is the embedding API endpoint.
                    type: string
                  model:
                    default: text-embedding-3-small
                    description: Model is the embedding model name.
                    type: string
                  provider:
                    default: openai
                    description: Provider is the embedding provider.
                    enum:
                    - openai
                    type: string
                required:
                - provider
                type: object
              knowledgeBase:
                description: KnowledgeBase configures runbook and postmortem indexing.
                properties:
                  autoReindexInterval:
                    default: 1h
                    description: AutoReindexInterval is how often to re-index documents
                      (e.g. "1h").
                    type: string
                  configMapRef:
                    description: |-
                      ConfigMapRef is a ConfigMap containing runbook documents.
                      Keys are document names, values are document content.
                    properties:
                      key:
                        description: Key is the key within the secret.
                        type: string
                      name:
                        description: Name is the name of the secret.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  runbooksPath:
                    default: /etc/kube-diagnose/runbooks
                    description: RunbooksPath is a directory path mounted into the
                      operator for runbooks.
                    type: string
                type: object
              llm:
                description: LLM is the AI language model configuration.
                properties:
                  apiKeySecretRef:
                    description: |-
                      APIKeySecretRef references a secret containing the API key.
                      Not required for vLLM.
                    properties:
                      key:
                        description: Key is the key within the secret.
                        type: string
                      name:
                        description: Name is the name of the secret.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  endpoint:
                    description: |-
                      Endpoint is the API endpoint URL.
                      Required for vLLM.
                    type: string
                  maxTokens:
                    default: 2048
                    description: MaxTokens is the maximum tokens for LLM responses.
                    type: integer
                  model:
                    default: gpt-4o-mini
                    description: Model is the model name to use.
                    type: string
                  provider:
                    default: openai
                    description: Provider is the LLM provider to use.
                    enum:
                    - openai
                    - anthropic
                    - vllm
                    type: string
                  temperature:
                    description: Temperature for LLM sampling.
                    type: number
                required:
                - provider
                type: object
              notifications:
                description: Notifications configures alert channels.
                properties:
                  pagerDuty:
                    description: PagerDuty notification settings.
                    properties:
                      enabled:
                        description: Enabled controls whether PagerDuty notifications
                          are sent.
                        type: boolean
                      integrationKeySecretRef:
                        description: IntegrationKeySecretRef references a secret with
                          the PagerDuty integration key.
                        properties:
                          key:
                            description: Key is the key within the secret.
                            type: string
                          name:
                            description: Name is the name of the secret.
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      minSeverity:
                        default: critical
                        description: MinSeverity is the minimum severity to trigger
                          a PagerDuty incident.
                        type: string
                    type: object
                  slack:
                    description: Slack notification settings.
                    properties:
                      channel:
                        description: Channel is the Slack channel (overrides webhook
                          default).
                        type: string
                      enabled:
                        description: Enabled controls whether Slack notifications
                          are sent.
                        type: boolean
                      minSeverity:
                        default: high
                        description: MinSeverity is the minimum severity to notify
                          about.
                        type: string
                      webhookURLSecretRef:
                        description: WebhookURLSecretRef references a secret with
                          the Slack webhook URL.
                        properties:
                          key:
                            description: Key is the key within the secret.
                            type: string
                          name:
                            description: Name is the name of the secret.
                            type: string
                        required:
                        - key
                        - name
                        type: object
                    type: object
                  webhook:
                    description: Webhook notification settings.
                    properties:
                      enabled:
                        description: Enabled controls whether webhook notifications
                          are sent.
                        type: boolean
                      headers:
                        additionalProperties:
                          type: string
                        description: Headers are additional HTTP headers to include.
                        type: object
                      method:
                        default: POST
                        description: Method is the HTTP method to use (POST or PUT).
                        type: string
                      minSeverity:
                        default: high
                        description: MinSeverity is the minimum severity to trigger
                          the webhook.
                        type: string
                      secretRef:
                        description: SecretRef is an optional HMAC secret for request
                          signing.
                        properties:
                          key:
                            description: Key is the key within the secret.
                            type: string
                          name:
                            description: Name is the name of the secret.
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      url:
                        description: URL is the webhook endpoint URL.
                        type: string
                    type: object
                type: object
              qdrant:
                description: Qdrant is the vector store configuration.
                properties:
                  apiKeySecretRef:
                    description: APIKeySecretRef references a secret containing the
                      Qdrant API key.
                    properties:
                      key:
                        description: Key is the key within the secret.
                        type: string
                      name:
                        description: Name is the name of the secret.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  collectionPrefix:
                    default: kube-diagnose
                    description: CollectionPrefix for all Qdrant collections.
                    type: string
                  host:
                    default: qdrant
                    description: Host is the Qdrant server host.
                    type: string
                  httpPort:
                    default: 6333
                    description: HTTPPort is the Qdrant HTTP port.
                    type: integer
                  port:
                    default: 6334
                    description: Port is the Qdrant gRPC port.
                    type: integer
                  tlsEnabled:
                    description: TLSEnabled enables TLS for Qdrant connection.
                    type: boolean
                required:
                - host
                type: object
            type: object
          status:
            description: LogIntelligencePlatformStatus defines the observed state
              of LogIntelligencePlatform.
            properties:
              activeIncidents:
                description: ActiveIncidents is the count of currently active incidents.
                type: integer
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              documentsIndexed:
                description: DocumentsIndexed is the number of knowledge base documents
                  indexed.
                type: integer
              lastReconcileTime:
                description: LastReconcileTime is when the platform was last reconciled.
                format: date-time
                type: string
              llmCallsToday:
                description: LLMCallsToday tracks LLM API calls for cost monitoring.
                type: integer
              llmReady:
                description: LLMReady indicates whether the configured LLM provider
                  is reachable.
                type: boolean
              qdrantConnected:
                description: QdrantConnected indicates whether Qdrant is reachable.
                type: boolean
              ready:
                description: Ready indicates whether the platform is fully initialized.
                type: boolean
              totalIncidentsToday:
                description: TotalIncidentsToday is the count of incidents created
                  today.
                type: integer
              watchedNamespaces:
                description: WatchedNamespaces is the count of namespaces being watched.
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    api-approved.kubernetes.io: https://github.com/kubernetes/kubernetes/pull/1111
    controller-gen.kubebuilder.io/version: v0.17.2
  name: logwatchpolicies.diagnose.diagnose.k8s.io
spec:
  group: diagnose.diagnose.k8s.io
  names:
    kind: LogWatchPolicy
    listKind: LogWatchPolicyList
    plural: logwatchpolicies
    shortNames:
    - lwp
    singular: logwatchpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    - jsonPath: .status.watchedPods
      name: Pods
      type: integer
    - jsonPath: .status.activeIncidents
      name: Incidents
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          LogWatchPolicy is the Schema for the logwatchpolicies API.
          It defines per-namespace log watching configuration.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: LogWatchPolicySpec defines the desired state of LogWatchPolicy.
            properties:
              enabled:
                default: true
                description: Enabled controls whether this policy is active.
                type: boolean
              exclusionPatterns:
                description: ExclusionPatterns defines log patterns to ignore.
                items:
                  description: ExclusionPattern defines a log pattern to exclude from
                    processing.
                  properties:
                    name:
                      description: Name is a human-readable name for the exclusion
                        rule.
                      type: string
                    pattern:
                      description: Pattern is a regex pattern. Logs matching this
                        are ignored.
                      type: string
                    reason:
                      description: Reason is a human-readable explanation for the
                        exclusion.
                      type: string
                  required:
                  - name
                  - pattern
                  type: object
                type: array
              incidentConfig:
                description: IncidentConfig defines incident creation and management
                  behavior.
                properties:
                  autoResolveAfter:
                    default: 24h
                    description: AutoResolveAfter is the duration after which resolved
                      incidents are archived.
                    type: string
                  burstThreshold:
                    default: 100
                    description: BurstThreshold is the number of errors per minute
                      that triggers a "burst" incident.
                    type: integer
                  dedupWindow:
                    default: 1h
                    description: |-
                      DedupWindow is the time window for deduplicating incidents.
                      Identical fingerprints within this window are merged.
                    type: string
                  maxAffectedPodsToTrack:
                    default: 20
                    description: MaxAffectedPodsToTrack limits how many pod names
                      are stored per incident.
                    type: integer
                  slaWindow:
                    default: 4h
                    description: SLAWindow defines how long an incident can remain
                      open before escalation.
                    type: string
                type: object
              logIntelligencePlatformRef:
                default: default
                description: LogIntelligencePlatformRef references the global platform
                  config.
                type: string
              logLevels:
                default:
                - ERROR
                - FATAL
                description: |-
                  LogLevels is the list of log levels to capture.
                  Defaults to ERROR and FATAL.
                items:
                  description: LogLevel defines the log severity levels to watch.
                  enum:
                  - DEBUG
                  - INFO
                  - WARNING
                  - ERROR
                  - FATAL
                  - CRITICAL
                  type: string
                type: array
              workloadSelector:
                description: WorkloadSelector defines which workloads to watch.
                properties:
                  deploymentNames:
                    description: DeploymentNames restricts watching to specific deployment
                      names.
                    items:
                      type: string
                    type: array
                  excludeNamespaces:
                    description: ExcludeNamespaces is a list of namespaces to exclude.
                    items:
                      type: string
                    type: array
                  labelSelector:
                    description: LabelSelector restricts log watching to pods matching
                      these labels.
                    properties:
                      matchExpressions:
                        description: matchExpressions is a list of label selector
                          requirements. The requirements are ANDed.
                        items:
                          description: |-
                            A label selector requirement is a selector that contains values, a key, and an operator that
                            relates the key and values.
                          properties:
                            key:
                              description: key is the label key that the selector
                                applies to.
                              type: string
                            operator:
                              description: |-
                                operator represents a key's relationship to a set of values.
                                Valid operators are In, NotIn, Exists and DoesNotExist.
                              type: string
                            values:
                              description: |-
                                values is an array of string values. If the operator is In or NotIn,
                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                the values array must be empty. This array is replaced during a strategic
                                merge patch.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: |-
                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                        type: object
                    type: object
                    x-kubernetes-map-type: atomic
                  namespaces:
                    description: |-
                      Namespaces is the list of namespaces to watch.
                      An empty list means all namespaces.
                    items:
                      type: string
                    type: array
                type: object
            type: object
          status:
            description: LogWatchPolicyStatus defines the observed state of LogWatchPolicy.
            properties:
              activeIncidents:
                description: ActiveIncidents is the count of active incidents for
                  this policy.
                type: integer
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastReconcileTime:
                description: LastReconcileTime is when the policy was last reconciled.
                format: date-time
                type: string
              logsProcessed:
                description: LogsProcessed is the total count of logs processed by
                  this policy.
                format: int64
                type: integer
              ready:
                description: Ready indicates whether the policy is active and watching.
                type: boolean
              watchedPods:
                description: WatchedPods is the count of pods currently being watched.
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

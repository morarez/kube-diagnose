version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true

linters:
  default: none

  enable:
    - dupl
    - errcheck
    - copyloopvar
    - ginkgolinter
    - goconst
    - gocyclo
    - gofmt
    - goimports
    - gosimple
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused

  settings:
    revive:
      rules:
        - name: comment-spacings

issues:
  exclude-rules:
    - path: api/
      linters:
        - lll
    - path: internal/
      linters:
        - dupl
        - lll
    - path: _test\.go
      linters:
        - revive
      text: "dot-imports"
    - path: internal/llm/provider\.go
      linters:
        - revive
      text: "stutters"
    - path: internal/rag/engine\.go
      linters:
        - revive
      text: "stutters"